name: M-Pesa Payments API — CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  # ─────────────────────────────────────────────────────────────
  # JOB 1: AI CODE REVIEW
  # ─────────────────────────────────────────────────────────────
  ai-code-review:
    name: 🤖 AI Code Review
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install jq
        run: sudo apt-get install -y jq

      - name: Read Mule flows
        run: |
          FLOW_XML=$(cat src/main/mule/*.xml | head -400)
          echo "FLOW_XML<<EOF" >> $GITHUB_ENV
          echo "$FLOW_XML" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: AI Error Handler Review
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          PROMPT="Review this Mule 4 XML. Does every flow have an error-handler?
          List each flow and PASS or FAIL. End with overall PASS or FAIL.
          XML: $FLOW_XML"

          RESULT=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"gpt-4o-mini\",
                 \"messages\":[{\"role\":\"user\",
                 \"content\":$(echo "$PROMPT" | jq -Rs .)}],
                 \"max_tokens\":300}" \
            | jq -r '.choices[0].message.content')

          echo "================================================"
          echo "AI Review Result: $RESULT"
          echo "================================================"
          echo "$RESULT" | grep -qi "^PASS" || \
            echo "::warning::AI flagged potential issues"

  # ─────────────────────────────────────────────────────────────
  # JOB 2: BUILD
  # ─────────────────────────────────────────────────────────────
  build:
    name: 🔨 Build
    runs-on: ubuntu-latest
    needs: ai-code-review
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>${{ secrets.ANYPOINT_USERNAME }}</username>
                <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>${{ secrets.ANYPOINT_USERNAME }}</username>
                <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
              </server>
              <server>
                <id>mulesoft-public</id>
                <username>${{ secrets.ANYPOINT_USERNAME }}</username>
                <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          SETTINGS

      - name: Build application
        run: mvn clean package -DskipTests --no-transfer-progress

      - name: Upload JAR
        uses: actions/upload-artifact@v4
        with:
          name: mule-app-jar
          path: target/*.jar
          retention-days: 5

  # ─────────────────────────────────────────────────────────────
  # JOB 3: DEPLOY TO CLOUDHUB 2.0
  # Only on main branch
  # ─────────────────────────────────────────────────────────────
  deploy-cloudhub:
    name: 🚀 Deploy to CloudHub 2.0
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: Create Maven settings.xml
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/settings.xml << 'SETTINGS'
          <?xml version="1.0" encoding="UTF-8"?>
          <settings>
            <servers>
              <server>
                <id>anypoint-exchange-v3</id>
                <username>${{ secrets.ANYPOINT_USERNAME }}</username>
                <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
              </server>
              <server>
                <id>mulesoft-releases</id>
                <username>${{ secrets.ANYPOINT_USERNAME }}</username>
                <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
              </server>
              <server>
                <id>mulesoft-public</id>
                <username>${{ secrets.ANYPOINT_USERNAME }}</username>
                <password>${{ secrets.ANYPOINT_PASSWORD }}</password>
              </server>
            </servers>
          </settings>
          SETTINGS

      - name: Deploy to CloudHub 2.0
        run: |
          mvn clean package mule:deploy -DskipTests \
            -Danypoint.username=${{ secrets.ANYPOINT_USERNAME }} \
            -Danypoint.password=${{ secrets.ANYPOINT_PASSWORD }} \
            --no-transfer-progress

      - name: Wait for app to start
        run: |
          echo "Waiting 90 seconds for CloudHub to start the app..."
          sleep 90

      - name: Health Check
        run: |
          APP_URL="https://payments-notification-api.cloudhub.io"
          echo "Health check: $APP_URL/api/health"
          for i in 1 2 3; do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              --max-time 30 "$APP_URL/api/health" || echo "000")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "✅ App is UP and running!"
              curl -s "$APP_URL/api/health"
              break
            fi
            sleep 30
          done

      - name: AI Smoke Test
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          APP_URL="https://payments-notification-api.cloudhub.io"

          HEALTH=$(curl -s --max-time 30 "$APP_URL/api/health" \
            || echo '{"status":"UNREACHABLE"}')

          SUCCESS=$(curl -s --max-time 30 \
            -X POST "$APP_URL/api/notifications/success" \
            -H "Content-Type: application/json" \
            -d '{
              "transactionId":"SMOKE-001",
              "phoneNumber":"+254712345678",
              "amount":100,
              "timestamp":"2026-06-30T10:00:00Z",
              "status":"SUCCESS",
              "transactionRef":"SMOKE-REF-001"
            }' || echo '{"error":"unreachable"}')

          PROMPT="Verify these M-Pesa API responses look correct.
          Health: $HEALTH
          Success endpoint: $SUCCESS
          Reply PASS if correct, FAIL with reason if not."

          AI=$(curl -s https://api.openai.com/v1/chat/completions \
            -H "Authorization: Bearer $OPENAI_API_KEY" \
            -H "Content-Type: application/json" \
            -d "{\"model\":\"gpt-4o-mini\",
                 \"messages\":[{\"role\":\"user\",
                 \"content\":$(echo "$PROMPT" | jq -Rs .)}],
                 \"max_tokens\":150}" \
            | jq -r '.choices[0].message.content')

          echo "================================================"
          echo "✅ AI Smoke Test: $AI"
          echo "================================================"

      - name: Deployment Summary
        run: |
          echo "================================================"
          echo "✅ Deployment Complete!"
          echo "App:    payments-notification-api"
          echo "Env:    CloudHub 2.0 — Sandbox"
          echo "Health: https://payments-notification-api.cloudhub.io/api/health"
          echo "================================================"